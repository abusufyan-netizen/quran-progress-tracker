kind = "web"
previewPath = "/"
title = "Quran Progress Tracker"
version = "1.0.0"
id = "artifacts/quran-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20353

[services.development]
run = "pnpm --filter @workspace/quran-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-tracker", "run", "build" ]
publicDir = "artifacts/quran-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20353"
BASE_PATH = "/"
