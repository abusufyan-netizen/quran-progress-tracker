<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3a28"/>
      <stop offset="100%" stop-color="#1a5d3f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a07a16"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d4af37" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="url(#gold)" stroke-width="3" rx="16"/>
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5" rx="10"/>

  <g transform="translate(120, 180)">
    <rect x="0" y="0" width="90" height="90" rx="18" fill="url(#gold)"/>
    <path d="M22 22 H68 V64 Q45 54 22 64 Z" fill="#0f3a28" stroke="#0f3a28" stroke-width="2"/>
    <line x1="45" y1="22" x2="45" y2="60" stroke="#d4af37" stroke-width="1.5"/>
  </g>

  <text x="240" y="225" font-family="'Outfit','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="700" fill="#faf7f0">Mushaf</text>
  <text x="240" y="270" font-family="'Outfit','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="400" fill="#d4af37">Quran Progress Tracker</text>

  <text x="120" y="380" font-family="'Outfit','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="600" fill="#faf7f0">Track every page. Build the habit.</text>
  <text x="120" y="430" font-family="'Outfit','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#faf7f0" opacity="0.85">Streaks · Goals · Heatmap · Milestone Badges · Daily Verse</text>

  <g transform="translate(120, 490)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#faf7f0" opacity="0.08"/>
    <text x="90" y="38" font-family="'Outfit',Arial,sans-serif" font-size="22" font-weight="600" fill="#faf7f0" text-anchor="middle">604 pages</text>

    <rect x="200" y="0" width="180" height="60" rx="10" fill="#faf7f0" opacity="0.08"/>
    <text x="290" y="38" font-family="'Outfit',Arial,sans-serif" font-size="22" font-weight="600" fill="#faf7f0" text-anchor="middle">114 surahs</text>

    <rect x="400" y="0" width="180" height="60" rx="10" fill="#faf7f0" opacity="0.08"/>
    <text x="490" y="38" font-family="'Outfit',Arial,sans-serif" font-size="22" font-weight="600" fill="#faf7f0" text-anchor="middle">30 juz</text>
  </g>

  <text x="1080" y="540" font-family="'Amiri','Times New Roman',serif" font-size="48" font-weight="700" fill="#d4af37" text-anchor="end" direction="rtl">القرآن الكريم</text>
</svg>
